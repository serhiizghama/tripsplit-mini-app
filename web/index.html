<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>TripSplit</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!--
      Instant boot splash. Inlined here (markup + styles) on purpose: it must
      paint on the very first frame, BEFORE the app's JS/CSS bundle is fetched
      and parsed. That cold-start gap (Telegram WebView boot → download+parse
      the app → first React commit) is otherwise a blank white screen; over the
      dev cloudflared tunnel it's several seconds. `App.tsx` removes #ts-splash
      on its first mount (see the useEffect there).
    -->
    <style>
      html,
      body {
        margin: 0;
        background: #f4f5f7;
      }
      #ts-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4f5f7;
        opacity: 1;
        transition: opacity 0.35s ease;
      }
      #ts-splash.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .ts-splash__stage {
        position: relative;
        width: 116px;
        height: 116px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ts-splash__ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid rgba(22, 119, 255, 0.16);
        border-top-color: #1677ff;
        animation: ts-splash-spin 0.9s linear infinite;
      }
      .ts-splash__logo {
        width: 84px;
        height: 84px;
        filter: drop-shadow(0 8px 20px rgba(20, 60, 120, 0.18));
        animation: ts-splash-pulse 1.8s ease-in-out infinite;
      }
      .ts-splash__logo svg {
        display: block;
        width: 100%;
        height: 100%;
      }
      @keyframes ts-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes ts-splash-pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.06);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .ts-splash__ring,
        .ts-splash__logo {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="ts-splash" role="status" aria-label="Loading TripSplit">
      <div class="ts-splash__stage">
        <div class="ts-splash__ring"></div>
        <div class="ts-splash__logo">
          <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <linearGradient id="sp-bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#4FA2FF" />
                <stop offset="1" stop-color="#2A73DC" />
              </linearGradient>
              <linearGradient id="sp-face" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#FFFFFF" />
                <stop offset="1" stop-color="#EAF2FF" />
              </linearGradient>
              <clipPath id="sp-inner">
                <circle cx="316" cy="256" r="88" />
              </clipPath>
            </defs>
            <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#sp-bg)" />
            <circle cx="192" cy="256" r="122" fill="#FFFFFF" opacity="0.34" />
            <circle cx="192" cy="256" r="122" fill="none" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="6" />
            <circle cx="316" cy="256" r="120" fill="url(#sp-face)" stroke="#2A6FD6" stroke-width="12" />
            <g clip-path="url(#sp-inner)">
              <rect x="228" y="160" width="88" height="192" fill="#C3DBFF" />
              <rect x="316" y="160" width="88" height="192" fill="#EAF3FF" />
              <rect x="309" y="156" width="14" height="200" rx="7" fill="#FFFFFF" />
            </g>
            <circle cx="316" cy="256" r="88" fill="none" stroke="#3B8CF0" stroke-opacity="0.35" stroke-width="4" />
            <path d="M 316 150 A 106 106 0 0 0 226 206" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="8" stroke-linecap="round" />
          </svg>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
